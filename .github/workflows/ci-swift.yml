name: CI (Swift)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Swift Lint And Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict
      - name: Build Swift bindings package
        working-directory: bindings/swift
        run: swift build
      - name: Build Swift codegen package
        working-directory: tools/protoc-gen/swift
        run: swift build
