name: Release actrix binaries

# actrix is a server application shipped as a binary (not crates.io libraries).
# When a release is published (by the release-train, which tags v* and creates
# the GitHub Release), this workflow builds actrix binaries for each platform
# and attaches them to that release.
#
# It can also be triggered manually via workflow_dispatch to rebuild and replace
# binaries for an existing release.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to (re)build and upload binaries for
        required: true
        type: string

concurrency:
  group: release-actrix-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-release:
    name: Ensure release exists
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          EVENT_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${EVENT_TAG:-${INPUT_TAG:-}}"
          if [[ -z "$TAG" ]]; then
            echo "::error::No tag provided (set via release event or workflow_dispatch input)"
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Validate tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || {
            echo "::error::Expected a stable release tag in vX.Y.Z form, got $TAG"
            exit 1
          }
          git ls-remote --exit-code --tags \
            "https://github.com/$GITHUB_REPOSITORY.git" "refs/tags/$TAG" >/dev/null
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

  build:
    name: ${{ matrix.target.asset }}
    needs: validate-release
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest, asset: actrix-linux-x86_64 }
          - { os: macos-14, asset: actrix-macos-arm64 }
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 30
    env:
      TAG: ${{ needs.validate-release.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate-release.outputs.tag }}

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate

      # Build the Admin UI so the release binary embeds the real dist
      # (rust-embed). build.rs would also try this, but doing it explicitly
      # keeps the release reproducible (frozen lockfile).
      - name: Build Admin UI
        working-directory: actrix/crates/actrixd/admin/web
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build actrix (release)
        run: cargo build --release -p actrix

      - name: Stage binary
        run: |
          mkdir -p dist
          cp target/release/actrix "dist/${{ matrix.target.asset }}"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "dist/${{ matrix.target.asset }}" --clobber