name: Publish

on:
  push:
    tags:
      - "v*"
      - "py-v*"
      - "codegen-py-v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Publish to crates.io
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    if: |
      (github.event_name == 'workflow_dispatch' || 
       (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))) &&
      github.repository_owner != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      # Publish order: from base to advanced by dependency
      # 1. actr-protocol (base, no internal dependencies)
      - name: Verify actr-protocol
        working-directory: crates/protocol
        run: cargo package --list
      - name: Publish actr-protocol
        working-directory: crates/protocol
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-protocol already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 2. actr-version (depends on protocol)
      - name: Verify actr-version
        working-directory: crates/version
        run: cargo package --list
      - name: Publish actr-version
        working-directory: crates/version
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-version already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 3. actr-config (depends on protocol and version)
      - name: Verify actr-config
        working-directory: crates/config
        run: cargo package --list
      - name: Publish actr-config
        working-directory: crates/config
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-config already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 4. actr-framework (depends on protocol)
      - name: Verify actr-framework
        working-directory: crates/framework
        run: cargo package --list
      - name: Publish actr-framework
        working-directory: crates/framework
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-framework already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 5. actr-mailbox (depends on protocol)
      - name: Verify actr-mailbox
        working-directory: crates/runtime-mailbox
        run: cargo package --list
      - name: Publish actr-mailbox
        working-directory: crates/runtime-mailbox
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-mailbox already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 6. actr-framework-protoc-codegen (depends on framework and protocol)
      - name: Verify actr-framework-protoc-codegen
        working-directory: crates/framework-protoc-codegen
        run: cargo package --list
      - name: Publish actr-framework-protoc-codegen
        working-directory: crates/framework-protoc-codegen
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-framework-protoc-codegen already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

      # 7. actr-runtime (depends on all above crates)
      - name: Verify actr-runtime
        working-directory: crates/runtime
        run: cargo package --list
      - name: Publish actr-runtime
        working-directory: crates/runtime
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish 2>&1 | tee /tmp/publish.log || {
            if grep -q "already exists" /tmp/publish.log; then
              echo "actr-runtime already exists, skipping"
              exit 0
            else
              exit 1
            fi
          }

  # ─────────────────────────────────────────────────────────
  # Publish actr-python to PyPI
  # ─────────────────────────────────────────────────────────
  build-python:
    name: Build Python on ${{ matrix.os }} (${{ matrix.target }})
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/py-v'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/python
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install protobuf (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: .
        run: |
          brew install protobuf openssl

      - name: Install protobuf (Linux ARM64)
        if: matrix.os == 'ubuntu-24.04-arm'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install protobuf (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: .
        run: |
          choco install protoc openssl

      - name: Install maturin
        run: |
          python -m pip install -U maturin

      - name: Build package (Linux x86_64)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --compatibility manylinux2014 --manifest-path bindings/python/Cargo.toml
          manylinux: auto
          before-script-linux: |
            PROTOC_VERSION="29.3"
            ARCH=$(uname -m)
            if [ "$ARCH" = "x86_64" ]; then
              PROTOC_ARCH="x86_64"
            else
              PROTOC_ARCH="aarch_64"
            fi
            curl -LO "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-${PROTOC_ARCH}.zip"
            unzip -o "protoc-${PROTOC_VERSION}-linux-${PROTOC_ARCH}.zip" -d /usr/local
            chmod +x /usr/local/bin/protoc
            export PROTOC=/usr/local/bin/protoc

            if command -v yum &> /dev/null; then
              yum install -y perl-core make || yum install -y perl make
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y perl make
            fi

      - name: Build package (Linux ARM64)
        if: matrix.os == 'ubuntu-24.04-arm'
        run: |
          maturin build --release --target ${{ matrix.target }}

      - name: Build package (macOS/Windows)
        if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        run: |
          maturin build --release --target ${{ matrix.target }}

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/target/wheels/*.whl
          if-no-files-found: error

  publish-python:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/py-v'))
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

      - name: Publish to PyPI
        if: github.ref_type == 'tag' && !contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # Publish framework_codegen_python to PyPI
  # ─────────────────────────────────────────────────────────
  publish-codegen-python:
    name: Publish framework_codegen_python
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/codegen-py-v'))
    defaults:
      run:
        working-directory: tools/protoc-gen/python
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install -U build
          python -m build

      - name: Publish to TestPyPI
        if: contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: tools/protoc-gen/python/dist

      - name: Publish to PyPI
        if: github.ref_type == 'tag' && !contains(github.ref_name, 'beta')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: tools/protoc-gen/python/dist
