name: CI (Kotlin)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Kotlin Binding Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build Kotlin binding
        working-directory: bindings/kotlin
        run: ./gradlew :actr-kotlin:build --no-daemon
