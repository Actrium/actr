name: CI (TypeScript)

on:
  push:
    branches: [main, develop]
    paths:
      - 'bindings/typescript/**'
      - 'tools/protoc-gen/typescript/**'
  pull_request:
    branches: [main]
    paths:
      - 'bindings/typescript/**'
      - 'tools/protoc-gen/typescript/**'
  workflow_dispatch:

jobs:
  test:
    name: TypeScript Binding Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: bindings/typescript
        run: npm install
      - name: Build
        working-directory: bindings/typescript
        run: npm run build
