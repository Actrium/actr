name: CI (TypeScript)

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    name: TypeScript Format, Lint And Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        working-directory: bindings/typescript
        run: npm ci

      - name: Check formatting
        working-directory: bindings/typescript
        run: npm run format

      - name: Run lint
        working-directory: bindings/typescript
        run: npm run lint

      - name: Build
        working-directory: bindings/typescript
        run: npm run build

      - name: Cargo check
        working-directory: bindings/typescript
        run: cargo check --locked --manifest-path Cargo.toml
