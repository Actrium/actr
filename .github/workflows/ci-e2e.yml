name: CI (E2E)

on:
  push:
    branches:
      - codex/harry-e2e-nightly
    paths:
      - ".github/workflows/ci-e2e.yml"
  schedule:
    # GitHub Actions cron uses UTC. 18:00 UTC = 02:00 UTC+8 next day.
    - cron: "0 18 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GH_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
  ACTR_E2E_ACTRIX_REPO: https://github.com/Actrium/actrix.git
  ACTR_E2E_ACTRIX_ARTIFACT_REPO: Actrium/actrix
  ACTR_E2E_ACTRIX_ARTIFACT_WORKFLOW: "243491296"
  ACTR_E2E_ACTRIX_ARTIFACT_BRANCH: main
  PROTOC_VERSION: "29.3"

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-runtime-echo-e2e:
    name: Package Runtime Echo E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux e2e dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run package runtime echo e2e
        run: bash e2e/package-runtime-echo/run.sh

  rust-e2e:
    name: Rust E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Linux e2e dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust echo e2e
        run: cargo test -p actr-cli --test e2e_rust_echo -- --ignored --test-threads=1

  typescript-e2e:
    name: TypeScript E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Linux e2e dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 lsof perl
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run TypeScript echo e2e
        run: cargo test -p actr-cli --test e2e_typescript_echo -- --ignored --test-threads=1

  swift-e2e:
    name: Swift E2E
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure git for private Actrix checkout
        shell: bash
        env:
          ACTRIX_READ_TOKEN: ${{ secrets.ACTRIX_READ_TOKEN }}
        run: |
          git config --global url."https://x-access-token:${ACTRIX_READ_TOKEN}@github.com/Actrium/actrix".insteadOf "https://github.com/Actrium/actrix"
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install macOS e2e dependencies
        run: brew install protobuf xcodegen opus jq sqlite
      - name: Install UniFFI bindgen
        run: cargo install --locked uniffi --version 0.30.0 --features cli --bin uniffi-bindgen
      - uses: Swatinem/rust-cache@v2
      - name: Run Swift echo e2e
        run: cargo test -p actr-cli --test e2e_swift_echo -- --ignored --test-threads=1
