name: CI (Python Codegen)

on:
  push:
    branches: [main, develop]
    paths:
      - 'tools/protoc-gen/python/**'
      - '.github/workflows/ci-codegen-python.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/protoc-gen/python/**'
      - '.github/workflows/ci-codegen-python.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: tools/protoc-gen/python

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e .

      - name: Build package
        run: |
          python -m pip install -U build
          python -m build
