syntax = "proto3";

package media_streaming;

// 媒体轨道类型
enum TrackType {
  AUDIO = 0;
  VIDEO = 1;
}

// 媒体编码格式
enum Codec {
  OPUS = 0;      // 音频
  H264 = 1;      // 视频
  VP8 = 2;       // 视频
  VP9 = 3;       // 视频
  AV1 = 4;       // 视频
}

// 媒体质量配置
message QualitySettings {
  uint32 bitrate = 1;        // 比特率 (bps)
  uint32 width = 2;          // 视频宽度
  uint32 height = 3;         // 视频高度
  uint32 framerate = 4;      // 视频帧率
  uint32 sample_rate = 5;    // 音频采样率
  uint32 channels = 6;       // 音频通道数
}

// 发布媒体流请求
message PublishStreamRequest {
  string stream_id = 1;
  TrackType track_type = 2;
  Codec codec = 3;
  QualitySettings quality = 4;
  string description = 5;
}

message PublishStreamResponse {
  bool success = 1;
  string message = 2;
  string stream_id = 3;
}

// 订阅媒体流请求
message SubscribeStreamRequest {
  string stream_id = 1;
  optional QualitySettings preferred_quality = 2;
}

message SubscribeStreamResponse {
  bool success = 1;
  string message = 2;
  string stream_id = 3;
}

// 停止发布/订阅
message StopStreamRequest {
  string stream_id = 1;
}

message StopStreamResponse {
  bool success = 1;
  string message = 2;
}

// 获取可用流列表
message ListStreamsRequest {}

message StreamInfo {
  string stream_id = 1;
  TrackType track_type = 2;
  Codec codec = 3;
  QualitySettings quality = 4;
  string description = 5;
  string publisher_id = 6;
  uint64 created_at = 7;
}

message ListStreamsResponse {
  repeated StreamInfo streams = 1;
}

// 媒体流服务定义
service MediaStreamingService {
  // 发布媒体流
  rpc PublishStream(PublishStreamRequest) returns (PublishStreamResponse);
  
  // 订阅媒体流
  rpc SubscribeStream(SubscribeStreamRequest) returns (SubscribeStreamResponse);
  
  // 停止发布流
  rpc StopPublishing(StopStreamRequest) returns (StopStreamResponse);
  
  // 停止订阅流
  rpc StopSubscribing(StopStreamRequest) returns (StopStreamResponse);
  
  // 获取可用流列表
  rpc ListStreams(ListStreamsRequest) returns (ListStreamsResponse);
}