syntax = "proto3";

package media_relay;

// Media frame data for testing
message MediaFrame {
  bytes data = 1;        // Frame data (raw bytes)
  uint32 timestamp = 2;  // RTP timestamp (90kHz)
  string codec = 3;      // Codec type (VP8, H264, etc.)
  uint32 frame_number = 4; // Sequential frame number
}

// Request to relay a frame
message RelayFrameRequest {
  MediaFrame frame = 1;
}

// Response after relaying
message RelayFrameResponse {
  bool success = 1;
  uint64 received_at = 2; // Timestamp when received
}

// Media Relay Service
service RelayService {
  rpc RelayFrame(RelayFrameRequest) returns (RelayFrameResponse);
}
