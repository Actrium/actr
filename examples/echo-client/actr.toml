# Echo Client - Actor-RTC Framework
# This is a demonstration echo client that connects to an echo service

[package]
name = "echo-client"
version = "0.1.0"
edition = "2021"
description = "Echo client demonstration for Actor-RTC framework"
authors = ["Actor-RTC Framework Team"]
license = "MIT"

# Proto 依赖配置 - 引用外部 proto 定义
[dependencies.protos]
# 使用 echo 服务的 proto 定义（模拟外部依赖）
echo = { path = "proto/echo.proto" }

# 路由配置
[routing]
# 客户端 Actor，会调用远程的 echo 服务

# 运行时配置
[runtime]
# Actor ID 配置
actor_id = 2001
actor_type = "echo-client"

# 目标服务器配置
target_actor_id = 1001

# 信令服务器配置
[signaling]
url = "ws://localhost:8081"