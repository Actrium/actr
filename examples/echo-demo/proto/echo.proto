syntax = "proto3";

package echo;

// 基础回声请求和响应消息
message EchoRequest {
  string message = 1;
  optional string client_id = 2;
}

message EchoResponse {
  string reply = 1;
  uint64 timestamp = 2;
}

// 批量回声请求，用于性能测试
message BatchEchoRequest {
  repeated string messages = 1;
  optional uint32 batch_id = 2;
}

message BatchEchoResponse {
  repeated string replies = 1;
  uint32 batch_id = 2;
  uint32 processed_count = 3;
}

// 回声服务定义
service EchoService {
  // 基础回声方法
  rpc SendEcho(EchoRequest) returns (EchoResponse);
  
  // 批量回声方法，用于性能测试
  rpc BatchEcho(BatchEchoRequest) returns (BatchEchoResponse);
  
  // 流式回声，用于测试快车道
  rpc StreamEcho(stream EchoRequest) returns (stream EchoResponse);
}