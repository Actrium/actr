# Echo Demo Service - Actor-RTC Framework
# This is a demonstration echo service that runs as an independent actor

[package]
name = "echo-demo"
version = "0.1.0"
edition = "2021"
description = "Echo service demonstration for Actor-RTC framework"
authors = ["Actor-RTC Framework Team"]
license = "MIT"

# Proto 依赖配置
[dependencies.protos]
# 本地 proto 文件，定义 echo 服务
echo = { path = "proto/echo.proto" }

# 路由配置
[routing]
# 使用代码生成的默认路由配置
# EchoService 的所有方法将自动注册

# 运行时配置
[runtime]
# Actor ID 配置
actor_id = 1001
actor_type = "echo-service"

# 信令服务器配置
[signaling]
url = "ws://localhost:8081"