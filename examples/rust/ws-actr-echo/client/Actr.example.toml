edition = 1
exports = []

[package]
name = "ws-echo-client-app"
description = "WebSocket Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client", "websocket"]

[package.actr_type]
manufacturer = "acme"
name = "ws-echo-client-app"
version = "1.0.0"

[dependencies]
ws-echo-server = { actr_type = "acme:WsEchoService:1.0.0" }

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "ws-echo-client-app"

# The client does not need websocket listen_port (it does not act as a server)
# The server ws_address is discovered through the signaling service, and the client connects to it directly over WebSocket

# ACL configuration - allow responses from the WsEchoService server
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:WsEchoService:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
