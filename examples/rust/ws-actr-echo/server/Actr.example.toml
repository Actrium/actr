edition = 1
exports = ["../proto/echo.proto"]

[package]
name = "ws-echo-server"
description = "WebSocket Echo Server - 使用 WebSocket 直连通道的 Echo 服务"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example", "websocket"]

[package.actr_type]
manufacturer = "acme"
name = "WsEchoService"
version = "1.0.0"


[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "ws-echo-server"

# WebSocket 直连配置
# 节点启动后会在此端口监听入站 WebSocket 连接，
# 并将 ws://advertised_host:listen_port 注册到信令服务器。
# 客户端通过信令服务器发现该地址后，直接建立 WebSocket 连接。
[system.websocket]
listen_port = 9001
advertised_host = "127.0.0.1"

# ACL 配置 - 允许 ws-echo 客户端连接
[acl]

[[acl.rules]]
permission = "allow"
types = ["acme:ws-echo-client-app:1.0.0"]

[scripts]
dev = "cargo run"
test = "cargo test"
