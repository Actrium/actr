[package]
name = "realm-setup"
version = "0.3.0"
edition = "2024"
rust-version = "1.88"
description = "CLI tool to setup realms in actrix for actr-examples (via Admin REST API)"

[[bin]]
name = "realm-setup"
path = "src/main.rs"

[dependencies]
# HTTP client
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
    "json",
] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# CLI arguments
clap = { version = "4.5", features = ["derive"] }

# Error handling
anyhow = "1.0"

# TOML parsing and editing
toml = "0.8"
toml_edit = "0.22"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
