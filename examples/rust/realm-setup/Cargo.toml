[package]
name = "realm-setup"
version = "0.2.0"
edition = "2024"
rust-version = "1.88"
description = "CLI tool to setup realms in actrix for actr-examples"

[[bin]]
name = "realm-setup"
path = "src/main.rs"

[dependencies]
# gRPC
tonic = "0.13"
prost = "0.13"
prost-types = "0.13"

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# CLI arguments
clap = { version = "4.5", features = ["derive"] }

# Authentication
nonce-auth = "0.6.3"

# Error handling
anyhow = "1.0"

# TOML parsing
toml = "0.8"
serde = { version = "1.0", features = ["derive"] }

# Hex encoding
hex = "0.4"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Proto definitions (get proto files from this crate)
# actrix-proto = { path = "../../actrix/crates/actrix-proto" }
actrix-proto = { git = "https://github.com/actor-rtc/actrix.git", rev = "c55d0b7" }

[build-dependencies]
tonic-build = "0.13"
cargo_metadata = "0.17"
