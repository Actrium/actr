edition = 1
exports = []

[package]
name = "blocked-greeter-client"
manufacturer = "acme"
version = "1.0.0"
description = "Blocked Greeter Client (should be denied by ACL)"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example"]

[dependencies]
greeter.GreeterService = { actr_type = "acme:greeter.GreeterService:1.0.0" }

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 33554434
realm_secret = "rs_AclExampleSecret123456"

[system.discovery]
visible = true

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - this client tries to connect to greeter server
# but the server's ACL doesn't allow this type
[acl]
[[acl.rules]]
permission = "allow"
type = "acme:greeter.GreeterService:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
