edition = 1
exports = ["../proto/greeter.proto"]

[package]
name = "acl-server"
description = "ACL Protected Greeter Server"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example"]

[package.actr_type]
manufacturer = "acme"
name = "greeter.GreeterService"
version = "1.0.0"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 33554434
realm_secret = "rs_AclExampleSecret123456"

[system.discovery]
visible = true

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow only allowed-greeter-client
[acl]
[[acl.rules]]
permission = "allow"
type = "acme:allowed-greeter-client:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
