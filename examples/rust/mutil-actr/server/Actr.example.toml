edition = 1
exports = ["../proto/echo.proto"]

[package]
name = "echo-real-server"
description = "Echo Real Server"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example"]

[package.actr_type]
manufacturer = "acme"
name = "EchoService"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 0

[system.discovery]
visible = true

[system.tracing]
enabled = true
endpoint = "http://localhost:4317"
service_name = "echo-real-server"

# ACL configuration - allow echo client
[acl]

[[acl.rules]]
permission = "allow"
# Allow clients with actr_type = "acme+echo-client-app"
types = ["acme+echo-client-app"]

[scripts]
dev = "cargo run"
test = "cargo test"
