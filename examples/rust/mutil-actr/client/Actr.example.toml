edition = 1
exports = []

[package]
name = "echo-real-client-app"
description = "Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[package.actr_type]
manufacturer = "acme"
name = "echo-client-app"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 0

[system.discovery]
visible = true

[system.tracing]
enabled = true
endpoint = "http://localhost:4317"
service_name = "echo-real-client-app"

# ACL configuration - allow echo server
[acl]

[[acl.rules]]
permission = "allow"
# Allow server with actr_type = "acme:EchoService"
types = ["acme:EchoService"]

[scripts]
dev = "cargo run"
test = "cargo test"
