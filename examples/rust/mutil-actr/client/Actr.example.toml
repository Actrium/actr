edition = 1
exports = []

[package]
name = "echo-real-client-app"
description = "Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[package.actr_type]
manufacturer = "acme"
name = "echo-client-app"
version = "1.0.0"

[dependencies]
echo-real-server = { actr_type = "acme:EchoService:1.0.0" }

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 33554432
realm_secret = "rs_AeEwCl5kEEd4foT3KSH-ZSgIFfrBzvnO"

[system.discovery]
visible = true

[system.tracing]
enabled = true
endpoint = "http://localhost:4317"
service_name = "echo-real-client-app"

# ACL configuration - allow echo server
[acl]

[[acl.rules]]
permission = "allow"
# Allow server with actr_type = "acme:EchoService:1.0.0"
type = "acme:EchoService:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
