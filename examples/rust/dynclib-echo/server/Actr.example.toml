edition = 1
exports = ["../proto/echo.proto"]

[package]
name = "dynclib-echo-server"
description = "Dynclib Echo Server - echo service running as native shared library"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example", "dynclib"]

[package.actr_type]
manufacturer = "acme"
name = "DynclibEchoService"
version = "0.1.0"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "dynclib-echo-server"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow echo client
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:dynclib-echo-client-app:0.1.0"
