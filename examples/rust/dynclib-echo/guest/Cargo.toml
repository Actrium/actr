# Standalone workspace — built as a native cdylib (NOT a member of examples/rust workspace).
[workspace]

[package]
name = "dynclib-echo-guest"
version = "0.2.0"
edition = "2024"
rust-version = "1.88"

[lib]
crate-type = ["cdylib"]

[features]
default = ["cdylib"]
cdylib = ["actr-framework/cdylib"]

[dependencies]
actr-framework = { path = "../../../../core/framework" }
actr-protocol = { path = "../../../../core/protocol" }
async-trait = "0.1"
bytes = "1.11"
prost = "0.14"

[build-dependencies]
prost-build = "0.14"

[profile.release]
opt-level = 2
