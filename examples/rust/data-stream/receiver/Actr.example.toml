edition = 1
exports = ["../proto/file_transfer.proto"]

[package]
name = "file-transfer-receiver"
description = "File transfer receiver using DataStream API"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example"]

[package.actr_type]
manufacturer = "acme"
name = "FileTransferService"
version = "1.0.0"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 33554432
realm_secret = "rs_AeEwCl5kEEd4foT3KSH-ZSgIFfrBzvnO"

[system.discovery]
visible = true

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow file transfer sender
[acl]

[[acl.rules]]
permission = "allow"
# Allow clients with actr_type = "acme:GenericClient:1.0.0"
type = "acme:GenericClient:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
