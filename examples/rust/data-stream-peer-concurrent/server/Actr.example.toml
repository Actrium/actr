edition = 1
exports = ["../proto/data_stream_peer.proto"]

[package]
name = "data-stream-peer-concurrent-server"
description = "Data stream server for peer-to-peer bidirectional streaming with concurrent support"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example"]

[package.actr_type]
manufacturer = "acme"
name = "DataStreamPeerConcurrentServer"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 0

[system.discovery]
visible = true

[acl]

[[acl.rules]]
permission = "allow"
types = ["acme+DataStreamPeerConcurrentClient"]

[scripts]
dev = "cargo run"
test = "cargo test"
