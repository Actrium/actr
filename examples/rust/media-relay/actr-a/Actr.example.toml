edition = 1

[signaling]
url = "ws://localhost:8081/signaling/ws"

[ais_endpoint]
url = "http://localhost:8081/ais"

[deployment]
realm_id = 33554433
realm_secret = "rs_MediaRelayExampleSecret123"

[discovery]
visible = true

# ACL configuration - allow actr-b receiver to communicate with us
# This is BIDIRECTIONAL: we allow RelayService to relay TO us

[acl]

[[acl.rules]]
permission = "allow"
# Allow RelayService to send signaling/data to us (RelayClient)
type = "actr-example:RelayService:1.0.0"

[scripts]
dev = "cargo run"
test = "cargo test"
