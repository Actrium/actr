edition = 1
exports = []

[package]
name = "echo-real-client-app"
description = "Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[package.actr_type]
manufacturer = "acme"
name = "echo-client-app"
version = "v1"

[dependencies]
echo-real-server = {}

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 759049003

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "echo-real-client-app"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow echo server
[acl]

[[acl.rules]]
permission = "allow"
# Allow server with actr_type = "acme:EchoService:v1"
type = "acme:EchoService:v1"

[scripts]
dev = "cargo run"
test = "cargo test"
