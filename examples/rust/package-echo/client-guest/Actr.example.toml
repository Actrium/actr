edition = 1
exports = []

[package]
name = "package-echo-client-guest"
manufacturer = "acme"
version = "0.1.0"
description = "Package Echo Client Guest — cdylib workload for the client host"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example", "client-guest"]

[dependencies]
EchoService = {}

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "package-echo-client-guest"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

[acl]

[[acl.rules]]
permission = "allow"
type = "actrium:EchoService:0.2.1-beta"
