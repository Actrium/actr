# This is a standalone workspace (NOT a member of examples/rust workspace).
# It compiles to wasm32-unknown-unknown target.
[workspace]

[package]
name = "wasm-echo-guest"
version = "0.2.0"
edition = "2024"
rust-version = "1.88"

[lib]
crate-type = ["cdylib"]

[dependencies]
actr-framework = { path = "../../../../core/framework" }
actr-protocol = { path = "../../../../core/protocol" }
async-trait = "0.1"
bytes = "1.11"
prost = "0.14"

[build-dependencies]
prost-build = "0.14"

[lints.rust]
unexpected_cfgs = { level = "allow", check-cfg = [
    'cfg(feature, values("cdylib"))',
] }

[profile.release]
opt-level = "s"
