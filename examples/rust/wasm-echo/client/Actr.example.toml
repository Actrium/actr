edition = 1
exports = []

[package]
name = "wasm-echo-client"
description = "WASM Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[package.actr_type]
manufacturer = "acme"
name = "wasm-echo-client-app"
version = "0.1.0"

[dependencies]
wasm-echo-server = {}

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 1001

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "wasm-echo-client"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow WASM echo server to relay signaling back to the client
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:WasmEchoService:0.1.0"
