edition = 1

[package]
name = "EchoService"
manufacturer = "actrium"
version = "0.2.2"
description = "Signed Echo guest actor distributed as an ActrPackage"
license = "Apache-2.0"

exports = ["proto/echo.proto"]

# Phase 1: the guest binary is now a Component Model component
# (wasm32-wasip2). The host loads it through `Component::from_binary`
# rather than the legacy core-module + asyncify transform.
[binary]
path = "dist/echo-actr-0.2.2-wasm32-wasip2.wasm"
target = "wasm32-wasip2"

[build]
tool = "cargo"
manifest_path = "Cargo.toml"
artifact = "lib"
profile = "release"
target = "wasm32-wasip2"
# The component is emitted directly by cargo + wasm-component-ld (set via
# RUSTFLAGS on the `actr build` command). Post-build just copies it into
# the `dist/` tree the package builder reads.
post_build = [
  'mkdir -p "$(dirname "$ACTR_BUILD_BINARY_PATH")" && cp "target/wasm32-wasip2/release/echo_guest.wasm" "$ACTR_BUILD_BINARY_PATH"',
]
