edition = 1
exports = ["../proto/echo.proto"]

[package]
name = "echo-server"
description = "Echo Server (Native Mode Demo)"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "example", "native"]

[package.actr_type]
manufacturer = "acme"
name = "EchoServer"
version = "v1"

[dependencies]

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"

[system.deployment]
realm_id = 33554432
realm_secret = "rs_Uvj69r18EtEh2FzYlVhnXZ9FOM3ruAQ9"
# Native mode: ActrSystem registers with signaling server on its own
mode = "native"

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "echo-server-native"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration
[acl]
[[acl.rules]]
permission = "allow"
type = "acme:EchoClient:v1"

[scripts]
dev = "cargo run"
test = "cargo test"
