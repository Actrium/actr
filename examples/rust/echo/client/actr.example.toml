edition = 1
exports = []

[package]
name = "echo-client"
description = "Echo Client (Native Mode)"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[package.actr_type]
manufacturer = "acme"
name = "EchoClient"
version = "v1"

[dependencies]
echo-server = {}

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.ais_endpoint]
url = "http://localhost:8081/ais"


[system.deployment]
realm_id = 33554432
realm_secret = "rs_Uvj69r18EtEh2FzYlVhnXZ9FOM3ruAQ9"

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "echo-client"

[system.webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]

# ACL configuration - allow echo server
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:EchoServer:v1"

[scripts]
dev = "cargo run"
test = "cargo test"
