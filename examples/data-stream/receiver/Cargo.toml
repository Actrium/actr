[package]
name = "data-stream-receiver"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace]
# This is a standalone example, not part of the main workspace

[dependencies]
# Actor-RTC Framework Dependencies
actr-framework = { path = "../../../crates/framework" }
actr-protocol = { path = "../../../crates/protocol" }
actr-runtime = { path = "../../../crates/runtime" }
actr-config = { path = "../../../crates/config" }

tokio = { version = "1.41", features = ["full"] }
async-trait = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2.5"

# Protobuf dependencies (required by generated code)
prost = "0.14"
bytes = "1.8"

# Error handling
anyhow = "1.0"
