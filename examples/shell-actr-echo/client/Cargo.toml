[package]
name = "echo-real-client-app"
version = "0.1.0"
edition = "2024"

# 独立项目，不属于父 workspace
[workspace]

[dependencies]
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
prost = "0.14"
prost-types = "0.14"
bytes = "1.0"
async-trait = "0.1"
url = "2.0"

# Actr dependencies
actr-runtime = { path = "../../../crates/runtime" }
actr-protocol = { path = "../../../crates/protocol" }
actr-config = { path = "../../../crates/config" }
actr-framework = { path = "../../../crates/framework" }
