# SPDX-License-Identifier: Apache-2.0
#
# actr build manifest for the TypeScript echo workload.
#
# Compilation is driven by `build.sh` (tsc + jco componentize / ComponentizeJS),
# not by Cargo or the actr CLI's internal compile step — so this manifest
# does **not** declare a `[build]` section. Run packaging with:
#
#     ./build.sh                       # produce ./echo.wasm (Component)
#     actr build --no-compile -m manifest.toml
#                                      # pack the wasm into .actr
#
# Produces: dist/acme-EchoWorkloadTs-0.1.0-wasm32-wasip2.actr

edition = 1

[package]
name = "EchoWorkloadTs"
manufacturer = "acme"
version = "0.1.0"
description = "Echo workload authored in TypeScript (ComponentizeJS + StarlingMonkey), Component Model guest"
license = "Apache-2.0"

# ── Binary artifact ──────────────────────────────────────────────────────────
#
# `wasm32-wasip2` triggers BinaryKind::Component in actr_pack — the host loads
# this through `Component::from_binary` (Phase 1 Component Model rewrite).
[binary]
path = "echo.wasm"
target = "wasm32-wasip2"
