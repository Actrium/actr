included:
  - bindings/swift
  - tools/protoc-gen/swift
  - examples/audio-capture/AudioCaptureApp

excluded:
  - bindings/swift/.build
  - bindings/swift/ActrBindings
  - bindings/swift/ActrFFI.xcframework
  - tools/protoc-gen/swift/.build
  - examples/audio-capture/AudioCaptureApp/.build

disabled_rules:
