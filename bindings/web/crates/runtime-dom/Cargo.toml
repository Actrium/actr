[package]
name = "actr-runtime-dom"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Actor-RTC DOM Runtime (WASM)"

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"] # 生成 WASM + Rust 库

[dependencies]
# 共享代码
actr-web-common = { path = "../common" }
actr-protocol.workspace = true

# WASM 绑定
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
serde-wasm-bindgen.workspace = true

# Web APIs (DOM 环境)
web-sys = { workspace = true, features = [
    "console",
    "Window",
    "Document",
    "Navigator",
    "ServiceWorker",
    "ServiceWorkerContainer",
    "BeforeUnloadEvent",
    "MessageEvent",
    "MessagePort",
    "MessageChannel",
    # WebRTC APIs
    "RtcPeerConnection",
    "RtcDataChannel",
    "RtcDataChannelInit",
    "RtcDataChannelState",
    "RtcConfiguration",
    "RtcIceServer",
    "RtcSdpType",
    "RtcSessionDescriptionInit",
    "RtcPeerConnectionIceEvent",
    "RtcIceCandidate",
    "RtcIceCandidateInit",
    "RtcDataChannelEvent",
    "RtcPeerConnectionState",
    "RtcIceConnectionState",
    "RtcIceGatheringState",
    # Media APIs
    "MediaStream",
    "MediaStreamTrack",
    # 其他
    "BinaryType",
    "Blob",
    "ErrorEvent",
] }

# 异步运行时
futures.workspace = true
async-trait.workspace = true

# 序列化
serde.workspace = true
serde_json.workspace = true

# 工具
log.workspace = true
wasm-logger.workspace = true
console_error_panic_hook.workspace = true
thiserror.workspace = true

# 数据结构
bytes = "1.5"
parking_lot.workspace = true
dashmap.workspace = true

# UUID (with WASM support)
uuid = { version = "1.18", features = ["v4", "serde", "js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
