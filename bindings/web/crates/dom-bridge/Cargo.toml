[package]
name = "actr-dom-bridge"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Actor-RTC DOM-side bridge: talks to the Service Worker host over postMessage"

[lints]
workspace = true

[lib]
crate-type = ["cdylib", "rlib"] # Build both WASM and Rust library outputs

[dependencies]
# Shared code
actr-web-common = { path = "../common" }
actr-protocol.workspace = true

# WASM bindings
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
serde-wasm-bindgen.workspace = true

# Web APIs (DOM environment)
web-sys = { workspace = true, features = [
    "console",
    "Window",
    "Document",
    "Navigator",
    "ServiceWorker",
    "ServiceWorkerContainer",
    "BeforeUnloadEvent",
    "MessageEvent",
    "MessagePort",
    "MessageChannel",
    # WebRTC APIs
    "RtcPeerConnection",
    "RtcDataChannel",
    "RtcDataChannelInit",
    "RtcDataChannelState",
    "RtcConfiguration",
    "RtcIceServer",
    "RtcSdpType",
    "RtcSessionDescriptionInit",
    "RtcPeerConnectionIceEvent",
    "RtcIceCandidate",
    "RtcIceCandidateInit",
    "RtcDataChannelEvent",
    "RtcPeerConnectionState",
    "RtcIceConnectionState",
    "RtcIceGatheringState",
    # Media APIs
    "MediaStream",
    "MediaStreamTrack",
    # Other
    "BinaryType",
    "Blob",
    "ErrorEvent",
] }

# Async runtime
futures.workspace = true
async-trait.workspace = true

# Serialization
serde.workspace = true
serde_json.workspace = true

# Utilities
log.workspace = true
wasm-logger.workspace = true
console_error_panic_hook.workspace = true
thiserror.workspace = true

# Data structures
bytes = "1.5"
parking_lot.workspace = true
dashmap.workspace = true

# UUID (with WASM support)
uuid = { version = "1.18", features = ["v4", "serde", "js"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
