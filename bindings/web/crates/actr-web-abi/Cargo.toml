[package]
name = "actr-web-abi"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Actor-RTC browser ABI crate: core wasm + wasm-bindgen surface generated from actr-workload.wit"

[lints]
workspace = true

# cdylib so downstream wasm-pack invocations link a browser-loadable
# module; rlib so Rust tests / callers inside the workspace can also
# depend on this crate without a wasm toolchain in the way.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# WASM-related. `wasm-bindgen` is the load-bearing choice for Option U:
# browsers consume the `#[wasm_bindgen]`-generated JS glue directly,
# with no Component Model / jco in the path.
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
js-sys.workspace = true
serde-wasm-bindgen.workspace = true

# Serialization. Every generated type derives Serialize + Deserialize
# so `serde-wasm-bindgen` can marshal it against the JS side.
serde.workspace = true

# async-trait powers the `Workload` trait in host.rs. `?Send` is
# mandatory because wasm-bindgen's browser target is single-threaded
# and `Send` futures can't be produced from the JS-facing glue.
async-trait.workspace = true
