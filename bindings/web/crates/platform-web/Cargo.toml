[package]
name = "actr-platform-web"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Web platform implementation for Actor-RTC (Service Worker / DOM)"

[dependencies]
# Platform traits (trait definitions we implement)
actr-platform-traits = { workspace = true }
actr-runtime-mailbox = { workspace = true }
actr-protocol = { workspace = true }

# WASM / Web
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
web-sys = { workspace = true, features = [
    "Crypto",
    "SubtleCrypto",
    "CryptoKey",
    "Window",
    "WorkerGlobalScope",
    "Storage",
] }
serde-wasm-bindgen = { workspace = true }

# IndexedDB
rexie = { workspace = true }

# Async
async-trait = { workspace = true }
tokio = { workspace = true }

# Utilities
uuid = { workspace = true }
getrandom = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }

[lib]
crate-type = ["cdylib", "rlib"]
