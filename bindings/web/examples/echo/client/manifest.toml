# NOTE: This manifest is kept for web platform config reference.
# For actr pkg build, use client-guest/manifest.toml instead.
# For runtime config (signaling, AIS, WebRTC, ACL), use client-actr.toml.

edition = 1
exports = []

[package]
name = "echo-client-app"
manufacturer = "acme"
version = "0.1.0"
description = "Echo Client App"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "client"]

[dependencies]
EchoService = { actr_type = "acme:EchoService:0.1.0" }

# Web platform specific configuration (for reference / tooling)
[platform.web]
generate_types = true
types_output = "./src/generated/types"
generate_react_hooks = false
worker_type = "service-worker"
service_worker_path = "./public/actor.sw.js"
generate_sw_entry = true
