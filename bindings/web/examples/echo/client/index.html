<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echo Client - Actor-RTC Web</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #e0e0e0;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    h1 {
      color: #58a6ff;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9em;
    }

    #app {
      margin-top: 0;
    }

    .status {
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status.connecting {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid rgba(255, 193, 7, 0.3);
    }

    .status.connected {
      background: rgba(0, 212, 170, 0.2);
      color: #00d4aa;
      border: 1px solid rgba(0, 212, 170, 0.3);
    }

    .status.error {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
      border: 1px solid rgba(244, 67, 54, 0.3);
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .controls input {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      outline: none;
      background: rgba(0, 0, 0, 0.3);
      color: #e0e0e0;
    }

    .controls input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88, 166, 255, .15);
    }

    button {
      padding: 0.5rem 1rem;
      font-size: 1rem;
      background: #58a6ff;
      color: #0d1117;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }

    button:hover:not(:disabled) {
      background: #79b8ff;
    }

    button:disabled {
      background: rgba(88, 166, 255, 0.3);
      color: rgba(255, 255, 255, 0.4);
      cursor: not-allowed;
    }

    /* ── Echo results area ── */
    #result {
      margin-top: 1rem;
      padding: 15px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.6;
    }

    #result .entry {
      margin-bottom: 4px;
    }

    #result .time {
      color: #6e7681;
      margin-right: 6px;
    }

    #result .ok {
      color: #00d4aa;
    }

    #result .err {
      color: #f44336;
    }

    #result .info {
      color: #58a6ff;
    }

    /* ── SW runtime log panel ── */
    .log-container {
      margin-top: 20px;
    }

    .log-container h3 {
      color: #58a6ff;
      margin: 0 0 10px 0;
      font-size: 1em;
    }

    .log {
      background: #0d1117;
      color: #58a6ff;
      border-radius: 8px;
      padding: 15px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      height: 250px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .log-entry {
      margin-bottom: 4px;
      line-height: 1.5;
    }

    .log-entry.info {
      color: #58a6ff;
    }

    .log-entry.success {
      color: #00d4aa;
    }

    .log-entry.warn {
      color: #ffc107;
    }

    .log-entry.error {
      color: #f44336;
    }

    .log-entry .time {
      color: #6e7681;
      margin-right: 8px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📡 Echo Client</h1>
    <p class="subtitle">Actor-RTC Web — Browser client sample invoking the remote Echo service</p>

    <div id="app">
      <div id="status" class="status connecting">Connecting...</div>

      <div class="controls">
        <input id="msgInput" type="text" placeholder="Type a message…" value="Hello from Echo Client!" />
        <button id="sendBtn" disabled>Send Echo</button>
      </div>

      <div id="result"></div>
    </div>

    <div class="log-container">
      <h3>📋 Runtime logs</h3>
      <div class="log" id="swLog"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
