# NOTE: This manifest is kept for web platform config reference.
# For actr pkg build, use server-guest/manifest.toml instead.
# For runtime config (signaling, AIS, WebRTC, ACL), use server-actr.toml.

edition = 1
exports = ["../proto/echo.proto"]

[package]
name = "EchoService"
manufacturer = "acme"
version = "0.1.0"
description = "Echo Server - Browser-side Actor Service"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "server"]

[dependencies]

# Web platform specific configuration (for reference / tooling)
[platform.web]
generate_types = true
types_output = "./src/generated"
worker_type = "service-worker"
service_worker_path = "/actor.sw.js"
generate_sw_entry = true
