edition = 1
exports = ["proto/echo.proto"]

[package]
name = "echo-server"
description = "Echo Server - Browser-side Actor Service"
authors = ["Actr Dev Team"]
license = "Apache-2.0"
tags = ["dev", "server"]

[package.actr_type]
manufacturer = "acme"
name = "EchoService"
version = "0.1.0"

[dependencies]

# Web platform specific configuration
[platform.web]
generate_types = true
types_output = "./src/generated"
worker_type = "service-worker"
service_worker_path = "/actor.sw.js"
generate_sw_entry = true

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 2368266035
ais_endpoint = "http://localhost:8081/ais"

[system.discovery]
visible = true

[system.observability]
filter_level = "info"
tracing_enabled = false

[system.webrtc]
stun_urls = ["stun:localhost:3478"]

# ACL configuration - allow echo clients
[acl]

[[acl.rules]]
permission = "allow"
types = ["acme:echo-client-app:0.1.0"]
