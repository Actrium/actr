<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Server - Actor-RTC Web</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #00d4aa;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .status {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .status.ready {
            background: rgba(0, 212, 170, 0.2);
            color: #00d4aa;
            border: 1px solid rgba(0, 212, 170, 0.3);
        }

        .status.error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid rgba(244, 67, 54, 0.3);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-section {
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info-section h3 {
            color: #00d4aa;
            margin: 0 0 15px 0;
            font-size: 1em;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
        }

        .info-value {
            color: #e0e0e0;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }

        .log-container {
            margin-top: 20px;
        }

        .log-container h3 {
            color: #00d4aa;
            margin: 0 0 10px 0;
            font-size: 1em;
        }

        .log {
            background: #0d1117;
            color: #58a6ff;
            border-radius: 8px;
            padding: 15px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 12px;
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry {
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .log-entry.info {
            color: #58a6ff;
        }

        .log-entry.success {
            color: #00d4aa;
        }

        .log-entry.warn {
            color: #ffc107;
        }

        .log-entry.error {
            color: #f44336;
        }

        .log-entry .time {
            color: #6e7681;
            margin-right: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: rgba(0, 212, 170, 0.1);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #00d4aa;
        }

        .stat-label {
            color: #888;
            font-size: 0.85em;
            margin-top: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🖥️ Echo Server</h1>
        <p class="subtitle">Actor-RTC browser-hosted server sample</p>

        <div id="status" class="status loading">
            <div class="spinner"></div>
            <span>Starting server...</span>
        </div>

            <div class="info-section">
            <h3>📡 Server info</h3>
            <div class="info-item">
                <span class="info-label">Service Name</span>
                <span class="info-value" id="serviceName">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Signaling URL</span>
                <span class="info-value" id="signalingUrl">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Realm ID</span>
                <span class="info-value" id="realmId">-</span>
            </div>
            <div class="info-item">
                <span class="info-label">Actor Type</span>
                <span class="info-value" id="actrType">-</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="requestCount">0</div>
                <div class="stat-label">Total requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="successCount">0</div>
                <div class="stat-label">Successful responses</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="errorCount">0</div>
                <div class="stat-label">Error count</div>
            </div>
        </div>

        <div class="log-container">
            <h3>📋 Server logs</h3>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
