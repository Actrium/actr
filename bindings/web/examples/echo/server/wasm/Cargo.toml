[package]
name = "echo-server-web"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Echo Server WASM for Web - user workload + SW runtime packaged into a single WASM"

# Standalone project, not part of the parent workspace
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Actor-RTC Service Worker Runtime (includes framework code)
actr-runtime-sw = { path = "../../../../crates/runtime-sw" }
actr-web-common = { path = "../../../../crates/common" }

# WASM bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"

# Web APIs
web-sys = { version = "0.3", features = ["console"] }

# Async
futures = "0.3"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Protobuf
prost = "0.14"
bytes = "1.0"

# Logging
log = "0.4"
wasm-logger = "0.2"
console_error_panic_hook = "0.1"

[build-dependencies]
prost-build = "0.14"
