[package]
name = "echo-server-wasm"
version = "0.2.0"
edition = "2024"
rust-version = "1.88"
description = "Echo Server WASM - 用户 Workload + SW Runtime 打包成一个 WASM"

# 独立项目，不属于父 workspace
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Actor-RTC Service Worker Runtime (包含框架代码)
actr-runtime-sw = { path = "../../../../crates/runtime-sw" }
actr-web-common = { path = "../../../../crates/common" }

# WASM 绑定
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"

# Web APIs
web-sys = { version = "0.3", features = ["console"] }

# 异步
futures = "0.3"
async-trait = "0.1"

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Protobuf
prost = "0.14"
bytes = "1.0"

# 日志
log = "0.4"
wasm-logger = "0.2"
console_error_panic_hook = "0.1"
