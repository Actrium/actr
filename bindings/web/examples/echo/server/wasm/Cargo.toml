[package]
name = "echo-server-web"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Echo Server WASM for Web - Runtime Host (guest loaded separately)"

# Standalone project, not part of the parent workspace
[workspace]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Actor-RTC Service Worker host (Component Model bridge + runtime wiring)
actr-sw-host = { path = "../../../../crates/sw-host" }
actr-web-common = { path = "../../../../crates/common" }

# WASM bindings
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
js-sys = "0.3"
serde-wasm-bindgen = "0.6"

# Web APIs
web-sys = { version = "0.3", features = ["console"] }

# Async
futures = "0.3"
async-trait = "0.1"

# Logging
log = "0.4"
wasm-logger = "0.2"
console_error_panic_hook = "0.1"
