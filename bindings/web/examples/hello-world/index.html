<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actor-RTC Web - Hello World</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 0 auto;
        padding: 2rem;
      }
      h1 {
        color: #333;
      }
      #app {
        margin-top: 2rem;
      }
      .status {
        padding: 1rem;
        border-radius: 4px;
        margin-bottom: 1rem;
      }
      .status.connecting {
        background: #fff3cd;
        color: #856404;
      }
      .status.connected {
        background: #d4edda;
        color: #155724;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
      }
      button {
        padding: 0.5rem 1rem;
        font-size: 1rem;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      button:disabled {
        background: #6c757d;
        cursor: not-allowed;
      }
      #result {
        margin-top: 1rem;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>🚀 Actor-RTC Web - Hello World</h1>
    <div id="app">
      <div id="status" class="status connecting">连接中...</div>
      <button id="sendBtn" disabled>发送 Echo 消息</button>
      <div id="result"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
