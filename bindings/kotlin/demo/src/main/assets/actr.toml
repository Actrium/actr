edition = 1

[package]
name = "EchoApp"
manufacturer = "acme"
version = "0.1.0"
description = "Actor-RTC EchoApp — Android linked runtime"

[dependencies]
echo = { actr_type = "actrium:EchoService:1.0.0" }
stream = { actr_type = "actrium:DuplexStreamService:0.1.0" }

[signaling]
url = "ws://192.168.212.112:8080/signaling/ws"

[ais_endpoint]
url = "http://192.168.212.112:8080/ais"

[deployment]
realm_id = 1001
realm_secret = "rs_TI1u7FdVIrp1giKCd580-Ap42mE7-kmx"

[discovery]
visible = true

[observability]
filter_level = "info"
tracing_enabled = false

[webrtc]
force_relay = false
stun_urls = ["stun:192.168.212.112:3478"]
turn_urls = ["turn:192.168.212.112:3478"]

[hyper]
data_dir = "/data/data/io.actorrtc.demo/files/hyper"

[hyper.trust]
kind = "dev_only"

[acl]

[[acl.rules]]
permission = "allow"
type = "acme:EchoApp:0.1.0"

[[acl.rules]]
permission = "allow"
type = "actrium:EchoService:1.0.0"

[[acl.rules]]
permission = "allow"
type = "actrium:DuplexStreamService:0.1.0"

