edition = 1
exports = []

[package]
name = "echo-client-app"
manufacturer = "acme"
description = "Android Echo Client"
authors = []
license = "Apache-2.0"
tags = ["dev", "example", "android"]

[dependencies]
EchoService = { actr_type = "acme:EchoService:1.0.0" }
DataStreamConcurrentServer = { actr_type = "acme:DataStreamConcurrentServer:1.0.0" }

[signaling]
url = "ws://10.0.2.2:8081/signaling/ws"

[ais_endpoint]
url = "http://10.0.2.2:8081"

[webrtc]
stun_urls = []
turn_urls = []
force_relay = false

[deployment]
realm_id = 6

[discovery]
visible = true

[observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://10.30.3.206:4317"
tracing_service_name = "android-echo-client"

[hyper]
data_dir = "/data/data/io.actorrtc.demo/files/hyper"

[hyper.trust]
kind = "dev_only"

# ACL configuration
[acl]

[[acl.rules]]
permission = "allow"
type = "acme:EchoService:1.0.0"

[[acl.rules]]
permission = "allow"
type = "acme:DataStreamConcurrentServer:1.0.0"

[[acl.rules]]
permission = "allow"
type = "acme:UnifiedActor:1.0.0"

[scripts]