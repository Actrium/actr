edition = 1
exports = []

[package]
name = "echo-client-app"
manufacturer = "acme"
version = "0.1.0"

[dependencies]
DataStreamConcurrentServer = { actr_type = "acme+DataStreamConcurrentServer" }
EchoService = { actr_type = "acme+EchoService" }

[system.signaling]
url = "ws://localhost:8081/signaling/ws"

[system.deployment]
realm_id = 6

[system.discovery]
visible = false

[system.webrtc]
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]
force_relay = true

# ACL configuration - allow echo server and data-stream-peer-concurrent server
[acl]

[[acl.rules]]
permission = "allow"
types = ["acme+EchoService", "acme+DataStreamConcurrentServer"]


[system.observability]
filter_level = "info"
tracing_enabled = false
