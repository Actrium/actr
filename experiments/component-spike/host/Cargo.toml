[package]
name = "spike-host"
version = "0.1.0"
edition = "2021"
publish = false

# Mark as an independent workspace so the repo-root workspace does not absorb this crate.
[workspace]

[dependencies]
# Pinned to 43.0.1 because 44.0.0 requires rustc >= 1.92; this toolchain has 1.91.1.
wasmtime = { version = "=43.0.1", features = ["component-model", "runtime", "cranelift"] }
wasmtime-wasi = "=43.0.1"
anyhow = "1"

[profile.release]
opt-level = 3
