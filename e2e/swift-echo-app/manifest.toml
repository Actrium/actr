# manifest.toml — EchoApp 包声明 + 依赖关系
#
# EchoApp 是 linked runtime，不走 actr build。此文件仅用于声明:
#   - 包身份 (package)
#   - 服务依赖 (dependencies) — 远程 EchoService 的 ActrType

edition = 1

[package]
name = "EchoApp"
manufacturer = "acme"
version = "0.1.0"
description = "Actor-RTC EchoApp — iOS linked runtime"

[dependencies]
echo = { actr_type = "actrium:EchoService:1.0.0" }