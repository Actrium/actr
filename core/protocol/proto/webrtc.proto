syntax = "proto2";

package webrtc;

// IceCandidate mirrors the WebRTC standard RTCIceCandidateInit interface.
message IceCandidate {
  required string candidate = 1;
  optional string sdp_mid = 2;
  optional uint32 sdp_mline_index = 3;
  optional string username_fragment = 4;
  optional string negotiation_id = 5;
  optional uint64 offer_version = 6;
}

// SessionDescription is the unified wrapper for SDP. All track information is encoded in the `sdp` string.
message SessionDescription {
  enum Type {
    OFFER = 0;
    ANSWER = 1;
    RENEGOTIATION_OFFER = 2;
    ICE_RESTART_OFFER = 3;
  }
  required Type type = 1;
  required string sdp = 2;
  optional string negotiation_id = 3;
  optional uint64 offer_version = 4;
  optional string ice_ufrag = 5;
}
