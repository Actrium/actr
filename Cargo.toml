[package]
name = "actr"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Actor-RTC: A WebRTC-native actor framework for distributed real-time systems"
keywords = ["actor", "webrtc", "distributed", "realtime", "p2p"]
categories = ["network-programming", "asynchronous", "web-programming"]

[dependencies]
# 核心依赖 - 全部重新导出
actr-protocol.workspace = true
actr-framework.workspace = true
actr-runtime = { workspace = true, optional = true }
actr-config = { workspace = true, optional = true }

# 常用依赖
async-trait.workspace = true

[features]
default = ["runtime", "config"]

# Runtime 支持 - 包含完整的 ActorSystem 运行时
# Note: actr-runtime has a non-optional dependency on actr-config,
# so runtime feature must include config as a transitive requirement
runtime = ["dep:actr-runtime", "config"]

# Config 支持 - 包含配置文件解析
config = ["dep:actr-config"]

# 完整功能
full = ["runtime", "config", "opentelemetry"]

# OpenTelemetry 可观测性
opentelemetry = [
    "runtime",
    "actr-runtime/opentelemetry",
    "actr-config/opentelemetry",
]

[workspace]
resolver = "2"
members = [
    # === Core Crates (核心 crate) ===
    "crates/protocol",
    "crates/version",
    "crates/config",
    "crates/framework",
    "crates/framework-protoc-codegen",
    "crates/runtime",
    "crates/runtime-mailbox",
]

# === Examples (示例) ===
# Examples 已独立在 workspace 之外，模拟外部用户使用场景
# Examples are now independent from the workspace to simulate external usage
exclude = ["examples/*"]

[workspace.package]
version = "0.1.3"
edition = "2024"
rust-version = "1.88"
license = "Apache-2.0"
repository = "https://github.com/actor-rtc/actr"
authors = ["Actor-RTC Contributors"]

[workspace.dependencies]
# === Internal Dependencies (内部依赖) ===
actr-protocol = { path = "crates/protocol", version = "0.1.4" }
actr-version = { path = "crates/version", version = "0.1.3" }
actr-config = { path = "crates/config", version = "0.1.4" }
actr-framework = { path = "crates/framework", version = "0.1.3" }
actr-runtime = { path = "crates/runtime", version = "0.1.4" }
actr-mailbox = { path = "crates/runtime-mailbox", version = "0.1.3" }

# === Async Runtime (异步运行时) ===
tokio = { version = "1.48", features = ["full"] }
async-trait = "0.1"
futures-util = "0.3"

# === Serialization (序列化) ===
prost = "0.14"
prost-types = "0.14"
prost-build = "0.14"
bytes = "1.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# === Utilities (工具库) ===
uuid = { version = "1.18", features = ["v4", "serde"] }
thiserror = "1.0"
anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
url = "2.5"

# === Logging (日志) ===
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# === Observability (可观测性) ===
opentelemetry = { version = "0.30.0", features = ["trace"] }
opentelemetry_sdk = { version = "0.30.0", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.30.0", features = ["grpc-tonic"] }
tracing-opentelemetry = "0.31"

# === WebRTC (WebRTC) ===
webrtc = "0.14"

# === Storage (存储) ===
rusqlite = { version = "0.32", features = ["bundled", "serde_json"] }

# === Networking (网络) ===
tokio-tungstenite = "0.28.0"
tokio-test = "0.4"
dashmap = "5.5"
crossbeam = "0.8"

# === Code Generation (代码生成) ===
quote = "1.0"
proc-macro2 = "1.0"
heck = "0.5"

# === CLI Tools (CLI 工具) ===
clap = { version = "4.5", features = ["derive", "cargo"] }
fs_extra = "1.3"
tempfile = "3.23"

[profile.dev]
opt-level = 0
debug = true

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = false
