edition = 1

[signaling]
url = "ws://localhost:8081/signaling/ws"

[ais_endpoint]
url = "http://localhost:8081/ais"

[deployment]
realm_id = 1001

# Package signature trust anchors. One entry = a single provider;
# multiple entries are tried in order (first match wins).
#
# Static anchor — pre-shared Ed25519 public key:
#   [[trust]]
#   kind = "static"
#   pubkey_file = "public-key.json"
#
# Registry anchor — look up MFR keys from AIS:
[[trust]]
kind = "registry"
endpoint = "http://localhost:8081/ais"

# Hyper-layer configuration (host runtime infrastructure). All fields
# are optional; defaults resolve to ~/.actr/hyper for `data_dir` and
# `{data_dir}/{actr_type}` for `storage_path_template`.
#
# `[hyper.trust]` is an alternative, singular form of the top-level
# `[[trust]]` array. `Node::from_config_file` prefers `[hyper.trust]`
# when present, otherwise chains the top-level `[[trust]]` anchors.
#
# A trust anchor **must** be configured for every runtime. For tests
# and local development, opt in explicitly:
#
#   [hyper.trust]
#   kind = "dev_only"
#
# `dev_only` accepts no real package signature (its internal pubkey is
# all-zero) but lets `Node::from_config_file` distinguish an explicit
# dev opt-in from a missing trust policy — the latter is a hard error.
#
# [hyper]
# data_dir = "~/.actr/hyper"
# storage_path_template = "{data_dir}/{actr_type}"

[discovery]
visible = true

[package]
# Path to the .actr package file (relative to this config file or absolute)
path = "dist/service.actr"

[observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "actr-service"

[webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]
