edition = 1

[signaling]
url = "ws://localhost:8081/signaling/ws"

[ais_endpoint]
url = "http://localhost:8081/ais"

[deployment]
realm_id = 1001

# Package signature trust anchors. One entry = a single provider;
# multiple entries are tried in order (first match wins).
#
# Static anchor — pre-shared Ed25519 public key:
#   [[trust]]
#   kind = "static"
#   pubkey_file = "public-key.json"
#
# Registry anchor — look up MFR keys from AIS:
[[trust]]
kind = "registry"
endpoint = "http://localhost:8081/ais"

[discovery]
visible = true

[package]
# Path to the .actr package file (relative to this config file or absolute)
path = "dist/service.actr"

[observability]
filter_level = "info"
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"
tracing_service_name = "actr-service"

[webrtc]
force_relay = false
stun_urls = ["stun:localhost:3478"]
turn_urls = ["turn:localhost:3478"]
